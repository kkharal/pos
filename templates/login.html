<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - POS System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 2rem;
        }

        .login-card .form-group {
            margin-bottom: 1.5rem;
        }

        .login-card .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.1rem;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 id="shop-name-title">Clothing Shop POS</h1>
            <p>Please login to continue</p>

            <div id="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" id="username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <script>
        // Load shop name on page load
        async function loadShopName() {
            try {
                const response = await fetch('/api/public/shop-name');
                const data = await response.json();
                if (data.shop_name) {
                    document.getElementById('shop-name-title').textContent = data.shop_name;
                }
            } catch (error) {
                console.error('Error loading shop name:', error);
            }
        }

        // Load shop name when page loads
        loadShopName();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorDiv.innerHTML = '<div class="alert alert-error">' + data.error + '</div>';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.innerHTML = '<div class="alert alert-error">An error occurred. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
